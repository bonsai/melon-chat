<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>melon-chat</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1>melon-chat</h1>
      <button id="btn-new-chat" title="New Chat">＋</button>
    </div>
    <div id="conv-list"></div>
  </aside>

  <main id="chat-area">
    <div id="chat-header">
      <button id="btn-menu" class="menu-btn">☰</button>
      <span id="chat-title">melon-chat</span>
      <span id="status-indicator"></span>
    </div>

    <div id="messages"></div>

    <div id="input-area">
      <button id="btn-image" title="画像を送信">📷</button>
      <input type="text" id="msg-input" placeholder="メッセージを入力..." autocomplete="off">
      <button id="btn-send" title="送信">➤</button>
    </div>
  </main>
</div>

<input type="file" id="file-input" accept="image/*" hidden>

<script src="/static/js/app.js"></script>
</body>
</html>
